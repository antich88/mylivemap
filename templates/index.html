<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"
    />
    <title>{{ share_meta.title if share_meta else "Живая карта интересов" }}</title>
    <meta property="og:title" content="{{ share_meta.title if share_meta else 'Живая карта интересов' }}" />
    <meta property="og:description" content="{{ share_meta.description if share_meta else 'Открытая карта событий в реальном времени' }}" />
    <meta property="og:image" content="{{ share_meta.image if share_meta else 'https://example.com/static/img/og-default.png' }}" />
    <meta property="og:url" content="{{ share_meta.url if share_meta else request.url }}" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
      integrity="sha256-Sf0x30eJ8aPI1e5k3A1w3NYWe+Y8+XoPD5Lw5+5R2X0="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}" />
  </head>
  <body>
      <div class="page-shell">
        <header class="filter-panel">
          <div class="panel-handle-container" role="button" aria-label="Переключить панель фильтров" tabindex="0">
            <div class="panel-handle" aria-hidden="true"></div>
          </div>
          <div class="category-chips">
            {% for group in categories %}
            <button
              class="category-chip"
              data-category-slug="{{ group.slug }}"
              style="--chip-color: {{ group.color }}"
              data-color="{{ group.color }}"
              data-icon="{{ group.icon }}"
              aria-pressed="false"
            >
              <span class="category-chip__icon">{{ group.icon }}</span>
              <span class="category-chip__label">{{ group.label }}</span>
              <span class="category-count">0</span>
            </button>
            {% endfor %}
            <button class="btn reset-btn" id="reset-btn">✖️ Сброс</button>
          </div>
          <div class="filter-panel__actions" aria-label="Панель управления фильтрами">
            <button
              id="auth-toggle-btn"
              class="panel-round-btn auth-toggle-btn"
              type="button"
              aria-label="Открыть панель входа"
            >
              <span class="panel-round-btn__label">ВХОД</span>
            </button>
            <div class="filter-panel__actions-right">
              <button
                id="show-all-btn"
                class="panel-round-btn show-all-btn"
                type="button"
                aria-label="Показать все категории"
              >
                <span class="show-all-btn__icon" aria-hidden="true">ВСЕ</span>
              </button>
              <button
                id="refresh-btn"
                class="refresh-btn"
                type="button"
                aria-label="Обновить метки"
              >
                <span class="refresh-btn__icon" aria-hidden="true">🔄</span>
              </button>
            </div>
          </div>
          <section class="auth-widget" aria-label="Авторизация">
            <div id="auth-status" class="auth-widget__status">Не авторизован</div>
            <div id="auth-message" class="auth-widget__message" role="status" aria-live="polite"></div>

            <div id="auth-panel" class="auth-panel" hidden>
              <h3 class="auth-panel__title" id="auth-panel-title">Войдите в аккаунт</h3>

              <form id="auth-form" class="auth-panel__form" autocomplete="on">
                <label class="auth-field">
                  <span class="auth-field__icon" aria-hidden="true">👤</span>
                  <input name="nickname" type="text" minlength="3" required placeholder="Имя пользователя" />
                </label>
                <label class="auth-field">
                  <span class="auth-field__icon" aria-hidden="true">🔒</span>
                  <input name="password" type="password" minlength="6" required placeholder="Пароль" />
                </label>
                <button id="auth-submit-btn" type="submit" class="auth-panel__submit">Войти</button>
              </form>

              <p class="auth-panel__hint" id="auth-switch-text">
                <span class="auth-panel__hint-prefix" id="auth-switch-prefix">Или</span>
                <button type="button" class="auth-panel__switch-link" id="auth-switch-link">создайте аккаунт</button>
              </p>

              <button id="logout-btn" class="auth-panel__logout" type="button" hidden>Выйти</button>
            </div>
          </section>
        </header>
    <main class="map-shell">
      <div id="leaflet-map"></div>
    </main>
  </div>
  <script id="live-map-bootstrap" type="application/json">
    {{ bootstrap_json | safe }}
  </script>
  <script id="category-definitions" type="application/json">
    {{ categories | tojson | safe }}
  </script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" defer></script>
  <script src="{{ url_for('static', filename='js/map.js') }}" defer></script>
</body>
</html>
