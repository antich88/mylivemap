services:
  - type: web
    name: mylivemap-web
    env: python
    plan: free
    region: oregon
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: FLASK_ENV
        value: production
      - key: APP_MODE
        value: sqlalchemy
      - key: DATABASE_URL
        fromDatabase:
          name: mylivemap-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
databases:
  - name: mylivemap-db
    plan: free
    region: oregon
