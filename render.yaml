services:
  - type: web
    name: live-map-web
    env: python
    plan: free
    region: eu-central-1
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: FLASK_ENV
        value: production
      - key: APP_MODE
        value: sqlalchemy
      - key: DATABASE_URL
        fromDatabase:
          name: live-map-db
          property: connectionString
      - key: SECRET_KEY
        # Render автоматически сгенерирует секрет, но его можно переопределить вручную
        generateValue: true
      - key: CLOUDINARY_URL
        value: ""
      - key: CLOUDINARY_CLOUD_NAME
        value: ""
      - key: CLOUDINARY_API_KEY
        value: ""
      - key: CLOUDINARY_API_SECRET
        value: ""
databases:
  - name: live-map-db
    plan: free
    region: eu-central-1
